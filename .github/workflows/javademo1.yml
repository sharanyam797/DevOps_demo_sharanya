name: Java demo job

on:
  push:
    branches: [ "sharanyam797-patch-1" ]
  pull_request:
    branches: [ "sharanyam797-patch-1" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build with maven
        run: mvn clean install
